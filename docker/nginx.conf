# ── Nginx 反代配置 ──────────────────────────────────────

server {
    listen 80;

    # Vue 前端静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 Cloud FastAPI
    location /api/ {
        proxy_pass http://cloud:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 支持（AI 对话流式输出）
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Swagger 文档
    location /docs {
        proxy_pass http://cloud:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://cloud:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 缺陷图片
    location /api/v1/defects/ {
        proxy_pass http://cloud:8000/api/v1/defects/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
