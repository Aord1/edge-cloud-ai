# ── 边云协同服务 ──────────────────────────────────────────
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edgecloud-db
    environment:
      POSTGRES_USER: edgecloud
      POSTGRES_PASSWORD: 201152
      POSTGRES_DB: edge_cloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgecloud -d edge_cloud"]
      interval: 5s
      timeout: 3s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: edgecloud-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqttdata:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  mqttdata:
